# FREE-TIER blueprint — no Background Worker, no Render Postgres/Key Value
# (Render doesn't offer free Background Workers at all, and free Postgres
# gets deleted after 30 days). Instead:
#   - Database: bring your own free Supabase Postgres (paste its connection
#     string as DATABASE_URL below when Render asks for secrets)
#   - Redis: skipped entirely — the code runs fine without it, just without
#     response caching
#   - Background scanning: a free GitHub Actions workflow calls
#     /api/cron/scan-all on a schedule instead of a persistent worker
#     (see .github/workflows/scan-cron.yml)
services:
  - type: web
    name: trading-bot-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false     # paste your Supabase connection string here
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4-turbo
      - key: TRADE_MODE
        value: paper
      - key: AUTO_EXECUTE
        value: "true"
      - key: CRYPTO_BROKER_NAME
        value: bybit
      - key: CRON_SECRET
        generateValue: true    # copy this into your GitHub Actions secret after deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: CRYPTO_API_KEY
        sync: false
      - key: CRYPTO_SECRET_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
