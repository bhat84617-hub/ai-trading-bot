databases:
  - name: trading-bot-db
    plan: starter
    # Free Postgres on Render gets deleted after 30 days — fine for a first
    # test, but switch to `starter` (paid) before you trust it with live data.

services:
  - type: keyvalue
    name: trading-bot-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []   # internal-only, no external access needed

  - type: web
    name: trading-bot-api
    runtime: python
    rootDir: backend
    plan: starter     # free plan cold-starts after 15 min idle — bad for a live trading API
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: trading-bot-db, property: connectionString }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: trading-bot-redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4-turbo
      - key: TRADE_MODE
        value: paper
      - key: AUTO_EXECUTE
        value: "true"
      - key: CRYPTO_BROKER_NAME
        value: bybit
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: CRYPTO_API_KEY
        sync: false
      - key: CRYPTO_SECRET_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false

  - type: worker
    name: trading-bot-scanner
    runtime: python
    rootDir: backend
    plan: starter    # background workers aren't available on the free plan at all
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.scanner_worker
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: trading-bot-db, property: connectionString }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: trading-bot-redis, property: connectionString }
      - key: AI_PROVIDER
        value: openai
      - key: AI_MODEL
        value: gpt-4-turbo
      - key: TRADE_MODE
        value: paper
      - key: AUTO_EXECUTE
        value: "true"
      - key: CRYPTO_BROKER_NAME
        value: bybit
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: CRYPTO_API_KEY
        sync: false
      - key: CRYPTO_SECRET_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
